<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <!-- HEADER -->
    <div class="header">
      <h1>Expense Tracker</h1>
      <div class="total" id="total-amount">$0.00</div>
      <div class="sub">Total spent this month</div>
    </div>

    <!-- SUMMARY CARDS -->
    <div class="summary" id="summary-cards"></div>

    <!-- ADD EXPENSE FORM -->
    <div class="form-card">
      <h2>Add new expense</h2>
      <div class="form-row">
        <input type="text"   id="exp-name"   placeholder="Expense name"/>
        <input type="number" id="exp-amount" placeholder="Amount ($)"/>
      </div>
      <div class="form-row">
        <select id="exp-category">
          <option value="">Loading categories...</option>
        </select>
        <input type="date" id="exp-date"/>
      </div>
      <button class="btn-add" id="btn-add">+ Add Expense</button>
    </div>

    <!-- CHART -->
    <div class="chart-card" id="chart-section" style="display:none;">
      <h2>Spending by category</h2>
      <div class="chart-wrap">
        <canvas id="spending-chart"></canvas>
      </div>
      <div class="legend" id="chart-legend"></div>
    </div>

    <!-- MANAGE CATEGORIES -->
    <div class="form-card">
      <h2>Manage categories</h2>
      <div class="cat-chips" id="cat-chips"></div>
      <div class="cat-add-row">
        <input
          type="text"
          id="new-cat-name"
          placeholder="New category name..."
          maxlength="30"
        />
        <input
          type="color"
          id="new-cat-color"
          value="#E67E22"
          title="Pick a color"
        />
        <button class="btn-cat" id="btn-add-cat">+ Add</button>
      </div>
    </div>

    <!-- EXPENSE LIST -->
    <div class="expenses-card">
      <div class="expenses-header">Recent expenses</div>
      <div id="expense-list">
        <div class="empty-state">Loading...</div>
      </div>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
