<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── LOGIN SCREEN ── shown when user is not logged in ───── -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">💰</div>
      <h1 class="login-title">Expense Tracker</h1>
      <p class="login-sub">Track your spending. Share with family.</p>
      <button class="btn-google" id="btn-google-login">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
          <path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z"/>
        </svg>
        Sign in with Google
      </button>
    </div>
  </div>

  <!-- ── APP SCREEN ── shown when user is logged in ─────────── -->
  <div id="app-screen" style="display:none;">
    <div class="app">

      <!-- HEADER -->
      <div class="header">
        <div class="header-top">
          <div>
            <h1>Expense Tracker</h1>
            <div class="total" id="total-amount">$0.00</div>
            <div class="sub">Total spent this month</div>
          </div>
          <!-- User info + sign out -->
          <div class="user-info">
            <img id="user-avatar" src="" alt="avatar" class="avatar"/>
            <div class="user-details">
              <div id="user-name" class="user-name"></div>
              <button class="btn-signout" id="btn-signout">Sign out</button>
            </div>
          </div>
        </div>
      </div>

      <!-- SUMMARY CARDS -->
      <div class="summary" id="summary-cards"></div>

      <!-- ADD EXPENSE FORM -->
      <div class="form-card">
        <h2>Add new expense</h2>
        <div class="form-row">
          <input type="text"   id="exp-name"   placeholder="Expense name"/>
          <input type="number" id="exp-amount" placeholder="Amount ($)"/>
        </div>
        <div class="form-row">
          <select id="exp-category">
            <option value="">Loading categories...</option>
          </select>
          <input type="date" id="exp-date"/>
        </div>
        <button class="btn-add" id="btn-add">+ Add Expense</button>
      </div>

      <!-- CHART -->
      <div class="chart-card" id="chart-section" style="display:none;">
        <h2>Spending by category</h2>
        <div class="chart-wrap">
          <canvas id="spending-chart"></canvas>
        </div>
        <div class="legend" id="chart-legend"></div>
      </div>

      <!-- MANAGE CATEGORIES -->
      <div class="form-card">
        <h2>Manage categories</h2>
        <div class="cat-chips" id="cat-chips"></div>
        <div class="cat-add-row">
          <input
            type="text"
            id="new-cat-name"
            placeholder="New category name..."
            maxlength="30"
          />
          <input type="color" id="new-cat-color" value="#E67E22"/>
          <button class="btn-cat" id="btn-add-cat">+ Add</button>
        </div>
      </div>

      <!-- EXPENSE LIST -->
      <div class="expenses-card">
        <div class="expenses-header">Recent expenses</div>
        <div id="expense-list">
          <div class="empty-state">Loading...</div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
